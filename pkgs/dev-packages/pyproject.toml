[build-system]
requires = ["uv_build"]
build-backend = "uv_build"

[project]
name = "scripts"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = ["cryptography~=48.0", "pydantic~=2.12", "pyyaml~=6.0"]

[project.scripts]
pkgmgr = "scripts.pkgmgr:main"
secretmgr = "scripts.secretmgr:main"
flat-flake = "scripts.flat_flake:main"
proxy-keydrv = "scripts.proxy_keydrv:main"

[tool.uv.build-backend]
module-root = ""

[tool.pyright]
typeCheckingMode = "strict"
