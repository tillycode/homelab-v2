podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false

extraDeploy:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: sealed-secrets
    spec:
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: default
          namespace: gateway
          sectionName: https
      hostnames:
        - sealed-secrets.k8s.szp.io
      rules:
        - backendRefs:
            - group: ""
              kind: Service
              name: sealed-secrets
              port: 8080
              weight: 1
          matches:
            - path:
                type: PathPrefix
                value: /
