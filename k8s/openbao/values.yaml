global:
  tlsDisable: false

injector:
  securityContext:
    pod:
      fsGroup: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      runAsUser: 100
      seccompProfile:
        type: RuntimeDefault

server:
  image:
    # added tpm2-pkcs11 to the image
    registry: ghcr.io
    repository: tillycode/openbao
    tag: 2.4.4-3

  # with auto unseal enabled, it's much safer to use RollingUpdate
  updateStrategyType: RollingUpdate

  volumes:
    - name: openbao-cert
      secret:
        defaultMode: 420
        secretName: openbao-cert
    - name: tpm2-tss-keystore
      hostPath:
        path: /var/lib/tpm2-tss/keystore
        type: Directory
    - name: tpm2-pkcs11
      hostPath:
        path: /var/lib/tpm2_pkcs11
        type: Directory

  volumeMounts:
    - name: openbao-cert
      mountPath: /openbao/tls
      readOnly: true
    - name: tpm2-tss-keystore
      mountPath: /var/lib/tpm2-tss/system/keystore
      readOnly: true
    - name: tpm2-pkcs11
      mountPath: /var/lib/tpm2_pkcs11
      # not readOnly since a lock file is created in the directory

  ha:
    enabled: true
    raft:
      enabled: true
      # We use tpm2-pkcs11 to automatically unseal the vault.
      # Before deploying vault, we need to distribute a certificate into all nodes.
      #
      # Generate the key and copy to all nodes:
      # 1. openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out rsa2048.pem
      #
      # Then for each node:
      # 1. nix shell nixpkgs#tpm2-tools --command 'tpm2_clear'
      # 2. nix shell nixpkgs#tpm2-tools --command 'tss2_provision'
      # 3. pkcs11-tool --slot-index=0 --init-token --label=OpenBao
      # 4. pkcs11-tool --slot-index=0 --init-pin --login
      # 6  read -r -s -p "PIN: " USER_PIN
      # 7. tpm2_ptool import --label OpenBao --key-label bao-unseal \
      #      --privkey rsa2048.pem --algorithm rsa --userpin "$USER_PIN"
      # 8. rm rsa2048.pem
      #
      # At last remove the private key from all nodes, and init the first node.
      #
      #     kubectl exec -it openbao-0 -n openbao -- bao operator init \
      #       -recovery-shares=1 -recovery-threshold=1 --tls-skip-verify
      config: |
        ui = true

        seal "pkcs11" {
          lib = "/lib/libtpm2_pkcs11.so.0.0.0"
          mechanism = "CKM_RSA_PKCS_OAEP"
          token_label = "OpenBao"
          key_label = "bao-unseal"
        }

        listener "tcp" {
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_cert_file = "/openbao/tls/tls.crt"
          tls_key_file  = "/openbao/tls/tls.key"

          # Enable unauthenticated metrics access (necessary for Prometheus Operator)
          #telemetry {
          #  unauthenticated_metrics_access = "true"
          #}
        }

        storage "raft" {
          path = "/openbao/data"

          retry_join {
            leader_api_addr = "https://openbao-0.openbao-internal.openbao.svc.hasee.internal:8200"
            leader_tls_servername = "vault.szp15.com"
            leader_client_cert_file = "/openbao/tls/tls.crt"
            leader_client_key_file = "/openbao/tls/tls.key"
          }

          retry_join {
            leader_api_addr = "https://openbao-1.openbao-internal.openbao.svc.hasee.internal:8200"
            leader_tls_servername = "vault.szp15.com"
            leader_client_cert_file = "/openbao/tls/tls.crt"
            leader_client_key_file = "/openbao/tls/tls.key"
          }

          retry_join {
            leader_api_addr = "https://openbao-2.openbao-internal.openbao.svc.hasee.internal:8200"
            leader_tls_servername = "vault.szp15.com"
            leader_client_cert_file = "/openbao/tls/tls.crt"
            leader_client_key_file = "/openbao/tls/tls.key"
          }
        }

        service_registration "kubernetes" {}

  gateway:
    tlsRoute:
      enabled: true
      apiVersion: gateway.networking.k8s.io/v1alpha2
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: gateway
          namespace: gateway
          sectionName: vault
      hosts:
        - vault.szp15.com

  resources:
    requests:
      squat.ai/tpmrm: 1
    limits:
      squat.ai/tpmrm: 1

  extraEnvironmentVars:
    TPM2_PKCS11_STORE: /var/lib/tpm2_pkcs11
    TPM2_PKCS11_TCTI: device:/dev/tpmrm0

  extraSecretEnvironmentVars:
    - envName: BAO_HSM_PIN
      secretName: openbao-pkcs11-seal-env
      secretKey: BAO_HSM_PIN

  dataStorage:
    storageClass: rook-ceph-block

  statefulSet:
    securityContext:
      pod:
        fsGroup: 399
        runAsGroup: 399 # same as host tss group
        runAsNonRoot: true
        runAsUser: 100
        seccompProfile:
          type: RuntimeDefault
      container:
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]

extraObjects:
  - apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: openbao-cert
    spec:
      dnsNames:
        - vault.szp15.com
      issuerRef:
        group: cert-manager.io
        kind: ClusterIssuer
        name: letsencrypt
      secretName: openbao-cert
      usages:
        - digital signature
        - key encipherment
  - apiVersion: bitnami.com/v1alpha1
    kind: SealedSecret
    metadata:
      name: openbao-pkcs11-seal-env
    spec:
      encryptedData:
        BAO_HSM_PIN: 
