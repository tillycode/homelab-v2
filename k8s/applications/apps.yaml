---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami
spec:
  project: default
  source:
    repoURL: https://github.com/tillycode/homelab-v2.git
    targetRevision: main
    path: k8s/whoami
  destination:
    server: https://kubernetes.default.svc

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: virtual-machines
spec:
  project: default
  source:
    repoURL: https://github.com/tillycode/homelab-v2.git
    targetRevision: main
    path: k8s/virtual-machines
  destination:
    server: https://kubernetes.default.svc
