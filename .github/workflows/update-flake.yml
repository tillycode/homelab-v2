name: Update Flake Inputs

on:
  schedule:
    # Every Monday at 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: ./.github/actions/setup-git
      - name: Update flake inputs
        id: update
        run: |
          PREV=$(git rev-parse HEAD)
          nix flake update --commit-lock-file
          if [[ "$(git rev-parse HEAD)" != "$PREV" ]]; then
            {
              echo "pr-body<<EOF"
              git log -1 --format=%b
              echo EOF
              echo "updated=true"
            } >> "$GITHUB_OUTPUT"
          fi
      - id: vault
        uses: hashicorp/vault-action@v2
        if: steps.update.outputs.updated == 'true'
        with:
          url: https://vault.szp15.com
          role: tillycode
          method: jwt
          path: github
          secrets: github/token/homelab-action token
      - uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/update-flake
          title: "chore(flake): update flake inputs"
          token: ${{ steps.vault.outputs.token }}
          body: |
            ## :pushpin: Changes

            ```text
            ${{ steps.update.outputs.pr-body }}
            ```
