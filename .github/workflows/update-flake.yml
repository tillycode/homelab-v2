name: Update Flake Inputs

on:
  schedule:
    # Every Monday at 00:00 UTC
    - cron: "0 0 * * 1"
  push:
    branches:
      - feat/ci

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v21

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update flake inputs
        id: update
        run: |
          PREV=$(git rev-parse HEAD)
          nix flake update --commit-lock-file
          if [ "$(git rev-parse HEAD)" = "$PREV" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            PR_BODY=$(git log -1 --format=%B)
            git reset HEAD~1
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo 'pr-body<<EOF'
              echo "$PR_BODY"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - uses: peter-evans/create-pull-request@v8
        if: steps.update.outputs.changed == 'true'
        with:
          branch: automated/update-flake
          commit-message: "chore(flake): update flake inputs"
          title: "chore(flake): update flake inputs"
          body: ${{ steps.update.outputs.pr-body }}
          base: main
