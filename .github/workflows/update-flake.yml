name: Update Flake Inputs

on:
  schedule:
    - cron: '0 0 * * 1'
  push:
    branches:
      - feat/ci

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update flake inputs
        run: nix flake update

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No changes to flake.lock"
            exit 0
          fi
          BRANCH="automated/update-flake"
          git checkout -b "$BRANCH"
          git add flake.lock
          git commit -m "chore(flake): update flake inputs"
          git push origin "$BRANCH" --force
          if gh pr list --head "$BRANCH" --json number --jq '.[0].number' | grep -q '[0-9]'; then
            echo "PR already exists, branch updated"
          else
            gh pr create \
              --title "chore(flake): update flake inputs" \
              --body "Automated weekly update of all flake inputs." \
              --base main \
              --head "$BRANCH"
          fi
