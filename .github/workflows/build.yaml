name: Build

on:
  pull_request:
    branches:
      - "master"
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: Mic92/niks3-action@v1
        with:
          server-url: https://niks3.szp.io
      - run: |
          nix run .#nix-fast-build -- --no-nom --skip-cached
