name: Update Packages

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update packages
        run: nix develop --command pkgmgr update --keep-going

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No package changes"
            exit 0
          fi
          BRANCH="automated/update-packages"
          git checkout -b "$BRANCH"
          git add pkgs/
          git commit -m "chore(pkgs): update packages"
          git push origin "$BRANCH" --force
          if gh pr list --head "$BRANCH" --json number --jq '.[0].number' | grep -q '[0-9]'; then
            echo "PR already exists, branch updated"
          else
            gh pr create \
              --title "chore(pkgs): update packages" \
              --body "Automated weekly package updates via pkgmgr." \
              --base main \
              --head "$BRANCH"
          fi
