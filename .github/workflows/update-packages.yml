name: Update Packages

on:
  schedule:
    # Every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v21

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update packages
        id: update
        run: |
          PREV=$(git rev-parse HEAD)
          nix shell ".#devPackages/scripts" --command pkgmgr update --commit
          MESSAGES=$(git log --format="- %s" "${PREV}..HEAD")
          if [ -z "$MESSAGES" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo 'pr-body<<EOF'
              echo "$MESSAGES"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            git reset --soft "$PREV"
          fi

      - uses: peter-evans/create-pull-request@v8
        if: steps.update.outputs.changed == 'true'
        with:
          branch: automated/update-packages
          commit-message: "chore(pkgs): update packages"
          title: "chore(pkgs): update packages"
          body: ${{ steps.update.outputs.pr-body }}
          base: main
