name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v21
        with:
          determinate: false
          extra-conf: |
            extra-substituters = https://cache.szp.io
            extra-trusted-public-keys = cache.szp.io-1:5ka/6qZ6Gg8/zeUWwglEvQIP1d1a1yzMgGmwBkqNb7Y=

      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false

      - name: Get OIDC token
        id: oidc
        run: |
          token=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://niks3.szp.io" | jq -r '.value')
          echo "::add-mask::$token"
          echo "$token" > /tmp/niks3-token

      - name: Build and push
        env:
          NIKS3_AUTH_TOKEN_FILE: /tmp/niks3-token
        run: |
          nix shell "nixpkgs#nix-fast-build" --command \
            nix-fast-build --skip-cached --no-nom \
              --niks3-server https://niks3.szp.io
