name: With post step

description: An action that executes a post step after the main step

inputs:
  main:
    description: "The main step to run"
    default: "true"
  post:
    description: "The post step to run"
    default: "true"
  job_status:
    description: Job Status
    default: ${{ job.status }}

runs:
  using: "node24"
  main: "main.js"
  post: "post.js"
